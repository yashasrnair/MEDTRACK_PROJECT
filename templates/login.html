<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
    
        html, body {
                height: 100%;
                margin: 0;
            }

            body {
                background: url("{{ url_for('static', filename='images/reglog.png') }}") no-repeat center center fixed;
                background-size: cover;
            }
        

        .box {
            width: 320px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2> Login</h2>

        <form method="post" action="/login">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter Email" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Login</button>
        </form>

        <a href="{{ url_for('register') }}">New User? Register</a>
    </div>
</body>
</html>
