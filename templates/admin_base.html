<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin — MedTrack{% endblock %}</title>
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='images/logo.jpg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body data-user-name="{{ user_name }}" data-user-phone="">

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="{{ url_for('static', filename='images/logo.jpg') }}"
         alt="MedTrack" style="width:36px;height:36px;object-fit:cover;border-radius:9px;flex-shrink:0;">
    <span class="brand-name">MedTrack</span>
  </div>

  <!-- Admin badge -->
  <div style="margin:8px 12px 0;padding:6px 12px;background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.25);border-radius:8px;font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;">
    🛡 Admin Panel
  </div>

  <nav class="sidebar-nav">
    <a href="{{ url_for('admin_dashboard') }}"
       class="nav-item {% if request.endpoint == 'admin_dashboard' %}active{% endif %}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" style="background:linear-gradient(135deg,var(--purple),#7c3aed);">
        {{ user_name[0].upper() if user_name else 'A' }}
      </div>
      <div class="user-info">
        <div class="user-name">{{ user_name }}</div>
        <div class="user-role" style="color:var(--purple);">Administrator</div>
      </div>
    </div>
    <a href="{{ url_for('logout') }}" class="nav-item" style="margin-top:4px;color:var(--red);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </a>
  </div>
</aside>

<header class="topbar">
  <button class="hamburger" id="hamburgerBtn" type="button" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <div class="topbar-title">{% block page_title %}Admin{% endblock %}</div>
  <div class="topbar-actions">
    <span style="background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.25);color:var(--purple);padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;">🛡 ADMIN</span>
  </div>
</header>

<main class="main-content">
  <div class="page-body">
    {% block content %}{% endblock %}
  </div>
</main>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
