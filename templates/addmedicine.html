{% extends "base.html" %}
{% block title %}Add Medicine — MedTrack{% endblock %}
{% block page_title %}Add Medicine{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <div class="page-header-title">Add New Medicine</div>
    <div class="page-header-sub">Fill in the details to add a medicine to your schedule</div>
  </div>
</div>

<div style="max-width:640px;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;">
    <form method="POST" action="{{ url_for('addmedicine') }}">
      <div class="form-grid" style="margin-bottom:20px;">
        <div class="form-group">
          <label for="name">Medicine Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Paracetamol" required>
        </div>
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="" disabled selected>Select type</option>
            <option>Tablet</option>
            <option>Capsule</option>
            <option>Syrup</option>
            <option>Injection</option>
            <option>Drops</option>
            <option>Cream</option>
          </select>
        </div>
        <div class="form-group">
          <label for="dosage">Dosage</label>
          <input type="text" id="dosage" name="dosage" placeholder="e.g. 500mg" required>
        </div>
        <div class="form-group">
          <label for="amount">Amount per Dose</label>
          <input type="text" id="amount" name="amount" placeholder="e.g. 1 tablet" required>
        </div>
        <div class="form-group">
          <label for="time">Time to Take</label>
          <input type="time" id="time" name="time" required>
        </div>
        <div class="form-group"><!-- spacer --></div>
        <div class="form-group">
          <label for="start_date">Start Date</label>
          <input type="date" id="start_date" name="start_date" required>
        </div>
        <div class="form-group">
          <label for="finish_date">Finish Date</label>
          <input type="date" id="finish_date" name="finish_date" required>
        </div>
      </div>

      <div style="height:1px;background:var(--border);margin-bottom:20px;"></div>

      <div style="display:flex;gap:12px;">
        <a href="{{ url_for('schedule') }}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">+ Add to Schedule</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  const s = document.getElementById('start_date');
  const f = document.getElementById('finish_date');
  s.value = today; s.min = today; f.min = today;
  s.addEventListener('change', () => { if (f.value < s.value) f.value = s.value; f.min = s.value; });
});
</script>
{% endblock %}
